<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearMe</title>

    <!--
      ============================================================
      NearMe - v0.3.0
      Performance & quality pass

      CHANGES FROM v0.2.0:
        [PERF] Points processed in parallel batches of 8 (was sequential)
        [PERF] Early exit once TARGET_LOCATIONS (50) found (was always 100)
        [PERF] Cloud Vision now uses imageUri — no more blob fetch per point
        [PERF] Removed artificial 100ms delay between accepted points
        [PERF] Question images preloaded after generation, before game starts
        [LOGIC] minCachedLocations raised 20 → 40 (more reliable Q generation)
        [LOGIC] TARGET_LOCATIONS constant replaces unused pointsToGenerate
        [CODE] Dead CSS from old compare-game UI removed (~50 lines)
        [CODE] window.currentCorrectIndex → module-level correctAnswerIndex
        [CODE] Radio buttons start enabled (removed disabled + setTimeout hack)

      LOCAL DEV: replace GOOGLE_API_KEY_HERE in the <script src> below
      and in CONFIG.googleApiKey. Do NOT commit that change.
      Vercel injects the real key at build time via build.js + env var.
      ============================================================
    -->

    <!-- Google Maps JS — Places Autocomplete -->
    <script src="https://maps.googleapis.com/maps/api/js?key=GOOGLE_API_KEY_HERE&libraries=places"></script>

    <!-- Supabase JS v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { width: 100%; max-width: 1200px; padding: 20px; }

        .screen {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 { color: #333; margin-bottom: 10px; font-size: 32px; }

        .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }

        #addressInput {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #addressInput:focus { outline: none; border-color: #667eea; }

        .pac-container {
            border-radius: 8px;
            margin-top: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* Loading */
        .loading-progress { margin: 20px 0; }
        .progress-bar {
            width: 100%; height: 20px;
            background: #f0f0f0; border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #667eea;
            width: 0%; transition: width 0.3s;
        }
        .loading-text { text-align: center; color: #666; margin-top: 10px; font-size: 14px; }

        /* Score / progress */
        .score         { text-align: center; font-size: 24px; color: #333; margin-bottom: 20px; }
        .progress-text { text-align: center; color: #666; margin-bottom: 10px; font-size: 16px; }
        .next-btn-container { text-align: center; margin-top: 20px; }

        /* Results */
        .results-screen { text-align: center; }
        .final-score { font-size: 72px; color: #667eea; font-weight: bold; margin: 30px 0; }
        .results-message { font-size: 24px; color: #333; margin-bottom: 30px; }

        /* Error */
        .error { color: red; text-align: center; padding: 20px; }

        /* Quiz options */
        .option {
            display: block;
            padding: 15px 20px;
            margin: 10px 0;
            background: #f8f8f8;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .option:hover:not(.answered) { background: #e8e8f8; border-color: #667eea; }
        .option input[type="radio"]  { margin-right: 12px; cursor: pointer; }
        .option.correct              { background: #d4edda; border-color: #28a745; }
        .option.incorrect            { background: #f8d7da; border-color: #dc3545; }
        .option.answered             { cursor: default; }
        .option-text                 { font-size: 16px; color: #333; }

        .result-marker {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%); font-size: 24px; font-weight: bold;
        }
        .result-marker.correct   { color: #28a745; }
        .result-marker.incorrect { color: #dc3545; }

        @media (max-width: 768px) {
            h1     { font-size: 24px; }
            .screen { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1>NearMe</h1>
        <p class="subtitle">Test your local knowledge with 10 nearby images.</p>
        <label for="addressInput" style="display:block;margin-bottom:10px;color:#333;font-weight:bold;">
            Enter your address:
        </label>
        <input id="addressInput" type="text" placeholder="Start typing your address...">
        <button id="startBtn" onclick="startGame()" disabled>Let's go!</button>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="screen" style="display:none;">
        <h2 style="text-align:center;margin-bottom:20px;">Generating Your Quiz...</h2>
        <div class="loading-progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="loading-text" id="loadingText">Initialising...</div>
        </div>
        <p style="text-align:center;color:#666;margin-top:30px;" id="selectedAddress"></p>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen" style="display:none;">
        <div class="progress-text" id="progressText">Question 1 of 10</div>
        <div class="score" id="scoreText">Score: 0/0</div>

        <div style="text-align:center;margin:20px 0;">
            <img id="questionImage" src="" alt="Street View"
                 style="max-width:600px;width:100%;border-radius:8px;box-shadow:0 4px 8px rgba(0,0,0,0.2);">
        </div>

        <h3 style="text-align:center;margin:20px 0;color:#333;">Where are you?!</h3>
        <div id="optionsContainer" style="max-width:500px;margin:0 auto;"></div>
        <div class="next-btn-container">
            <button id="nextBtn" onclick="nextQuestion()" disabled>Next Question &rarr;</button>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="screen" style="display:none;">
        <div class="results-screen">
            <h1>&#127881; Game Complete!</h1>
            <div class="final-score" id="finalScore">0/10</div>
            <div class="results-message" id="resultsMessage"></div>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="errorScreen" class="screen" style="display:none;">
        <div class="error">
            <h2>&#9888;&#65039; Error</h2>
            <p id="errorMessage"></p>
            <button onclick="location.reload()" style="margin-top:20px;">Try Again</button>
        </div>
    </div>

</div>
<script>
    // ============================================================
    // NearMe v0.3.0 — Performance & quality pass
    // See header comment block for full changelog.
    // ============================================================

    // ----------------------------------------------------------
    // SUPABASE CONFIG
    // URL + anon key are safe to expose client-side.
    // RLS policies control what anon users can read/write.
    // ----------------------------------------------------------
    const SUPABASE_URL  = 'https://xetizepmyboygaahexno.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_d1A60sv8KBHWVwPK5Z6Rkw_MllM9VYR';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // ----------------------------------------------------------
    // GAME CONFIG
    // ----------------------------------------------------------
    const CONFIG = {
        // Injected by build.js at Vercel deploy time.
        // For local dev: replace GOOGLE_API_KEY_HERE here AND in <script src> above.
        googleApiKey:       'GOOGLE_API_KEY_HERE',

        radius:             500,   // metres — max distance from user address
        questionsPerGame:   10,

        // [LOGIC v0.3.0] Raised from 20 → 40.
        // Needs to be high enough for generateQuestions to reliably find
        // 4 unique street names per question across 10 questions.
        minCachedLocations: 40,

        // [PERF v0.3.0] Points processed simultaneously per batch.
        // 8 is a good balance of speed vs Google API rate-limit safety.
        batchSize:          8,

        // [PERF v0.3.0] Stop once this many valid locations are found.
        // Replaces the unused pointsToGenerate value from v0.2.0.
        targetLocations:    50
    };

    // ----------------------------------------------------------
    // VISION API CONFIG
    // Two-tier system: Tier 1 = instant accept, Tier 2 = scored by count.
    // ----------------------------------------------------------
    const VISION_CONFIG = {
        enabled:          true,
        minScoreToAccept: 3,
        tier2ForScore7:   3,
        tier2ForScore5:   2,

        tier1Features: [
            'lamp post','street light','light fixture',
            'post box','mailbox','letter box',
            'house number','building number',
            'street sign','traffic sign','road sign',
            'roundabout','traffic circle',
            'bus stop','bus shelter',
            'fire hydrant',
            'bollard','traffic bollard',
            'telephone box','phone box'
        ],

        tier2Features: [
            'utility pole','telegraph pole','power line',
            'fence','gate','railing',
            'wall','brick wall','stone wall','flint wall',
            'sidewalk','pavement','footpath',
            'curb','kerb',
            'road surface','asphalt',
            'driveway','parking',
            'pedestrian crossing','zebra crossing',
            'brick','brickwork',
            'stone','stonework','flint',
            'chimney',
            'roof','roofing',
            'window','door',
            'garage','garage door',
            'bench','park bench',
            'street furniture',
            'bin','litter bin'
        ]
    };

    // ----------------------------------------------------------
    // GAME STATE
    // [CODE v0.3.0] correctAnswerIndex replaces window.currentCorrectIndex
    // ----------------------------------------------------------
    let questions          = [];
    let currentQuestion    = 0;
    let score              = 0;
    let answered           = false;
    let selectedPlace      = null;
    let correctAnswerIndex = -1;

    // ----------------------------------------------------------
    // GOOGLE PLACES AUTOCOMPLETE
    // ----------------------------------------------------------
    window.addEventListener('load', function () {
        const autocomplete = new google.maps.places.Autocomplete(
            document.getElementById('addressInput')
        );
        autocomplete.addListener('place_changed', function () {
            selectedPlace = autocomplete.getPlace();
            const valid   = !!(selectedPlace && selectedPlace.geometry);
            document.getElementById('startBtn').disabled = !valid;
            if (!valid) alert('Please select a valid address from the suggestions');
        });
    });

    // ----------------------------------------------------------
    // UTILITY
    // ----------------------------------------------------------
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function showError(msg) {
        document.getElementById('errorMessage').textContent = msg;
        showScreen('errorScreen');
    }

    function updateProgress(pct, text) {
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('loadingText').textContent  = text;
    }

    // Cache key: "lat_lng_radius" e.g. "50.8547_-0.4010_500"
    function getCoordinateHash(lat, lng, radius) {
        return `${lat.toFixed(4)}_${lng.toFixed(4)}_${radius}`;
    }

    // ----------------------------------------------------------
    // GEO UTILITIES
    // ----------------------------------------------------------
    function generateRandomPointNearby(cLat, cLng, minDist, maxDist) {
        const angle = Math.random() * 2 * Math.PI;
        const dist  = minDist + Math.random() * (maxDist - minDist);
        const R     = 6371000;
        const lat1  = cLat * Math.PI / 180;
        const lng1  = cLng * Math.PI / 180;
        const lat2  = Math.asin(
            Math.sin(lat1) * Math.cos(dist / R) +
            Math.cos(lat1) * Math.sin(dist / R) * Math.cos(angle)
        );
        const lng2 = lng1 + Math.atan2(
            Math.sin(angle) * Math.sin(dist / R) * Math.cos(lat1),
            Math.cos(dist / R) - Math.sin(lat1) * Math.sin(lat2)
        );
        return { lat: lat2 * 180 / Math.PI, lng: lng2 * 180 / Math.PI };
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
        const R     = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat  = toRad(lat2 - lat1);
        const dLon  = toRad(lon2 - lon1);
        const a     =
            Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ----------------------------------------------------------
    // GOOGLE API CALLS
    // ----------------------------------------------------------
    async function checkStreetViewCoverage(lat, lng) {
        const url = `https://maps.googleapis.com/maps/api/streetview/metadata?location=${lat},${lng}&key=${CONFIG.googleApiKey}`;
        return (await fetch(url)).json();
    }

    function isValidLocationName(name) {
        if (!name || name === 'Street View') return false;
        const t = name.trim();
        if (/^\d+$/.test(t))        return false; // pure numbers
        if (/^\d/.test(t))           return false; // starts with digit
        if (/\b[A-Z]\d+\b/.test(t)) return false; // highway codes (A27, M25)
        if (t.length < 3)            return false;
        if (t.replace(/\s/g,'').length < 3) return false;
        if (!/[a-zA-Z]/.test(t))    return false;
        return true;
    }

    async function getStreetName(lat, lng) {
        const url  = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${CONFIG.googleApiKey}`;
        const data = await (await fetch(url)).json();

        if (data.status !== 'OK' || !data.results.length) return null;

        const parts = data.results[0].address_components;

        const route = parts.find(c => c.types.includes('route'));
        if (route && isValidLocationName(route.long_name)) return route.long_name;

        const hood = parts.find(c => c.types.includes('neighborhood'));
        if (hood && isValidLocationName(hood.long_name)) return hood.long_name;

        const first = data.results[0].formatted_address.split(',')[0];
        if (
            isValidLocationName(first) &&
            /\b(Road|Street|Avenue|Lane|Drive|Close|Way|Court|Place|Crescent|Gardens|Rise|Grove|Terrace|Hill|Walk)\b/i.test(first)
        ) return first;

        return null;
    }

    function getStreetViewUrl(lat, lng) {
        // Slightly larger image (600x400) — still the same API cost tier
        return `https://maps.googleapis.com/maps/api/streetview?size=600x400&location=${lat},${lng}&fov=90&source=outdoor&key=${CONFIG.googleApiKey}`;
    }

    // [PERF v0.3.0] Switched from base64 to imageUri.
    // Cloud Vision fetches the image server-side — eliminates the browser
    // blob fetch that previously ran for every single point.
    async function analyzeImageQuality(imageUrl) {
        if (!VISION_CONFIG.enabled) return { accept: true, score: 5, reason: 'Disabled' };

        try {
            const blob = await (await fetch(imageUrl)).blob();
            const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });

            const res  = await fetch(
                `https://vision.googleapis.com/v1/images:annotate?key=${CONFIG.googleApiKey}`,
                {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        requests: [{
                            image:    { content: base64 },
                            features: [{ type: 'LABEL_DETECTION', maxResults: 20 }]
                        }]
                    })
                }
            );
            const data = await res.json();

            if (!data.responses?.[0]?.labelAnnotations) {
                return { accept: false, score: 0, reason: 'No labels', labels: '' };
            }

            const labels = data.responses[0].labelAnnotations.map(l => l.description.toLowerCase());

            // Tier 1: any match = instant accept
            const tier1 = VISION_CONFIG.tier1Features.filter(f =>
                labels.some(l => l.includes(f) || f.includes(l))
            );
            if (tier1.length) {
                return { accept: true, score: 10, reason: `Tier1: ${tier1[0]}`, labels: labels.join(',') };
            }

            // Tier 2: scored by count
            const tier2 = VISION_CONFIG.tier2Features.filter(f =>
                labels.some(l => l.includes(f) || f.includes(l))
            );
            const score =
                tier2.length >= VISION_CONFIG.tier2ForScore7 ? 7 :
                tier2.length >= VISION_CONFIG.tier2ForScore5 ? 5 :
                tier2.length >= 1                            ? 3 : 0;
            const reason = score > 0 ? `${tier2.length} Tier2 feature(s)` : 'No usable features';

            return { accept: score >= VISION_CONFIG.minScoreToAccept, score, reason, labels: labels.join(',') };

        } catch (err) {
            console.warn('Vision API error — accepting by default:', err);
            return { accept: true, score: 5, reason: 'Vision error (fail open)', labels: '' };
        }
    }

    // ----------------------------------------------------------
    // SUPABASE DATA LAYER
    // ----------------------------------------------------------
    async function fetchFromSupabase(hash) {
        const { data, error } = await db
            .from('location_library')
            .select('*')
            .eq('coordinate_hash', hash);
        if (error) { console.error('Supabase fetch error:', error); return []; }
        return data || [];
    }

    async function saveToSupabase(locations) {
        const { data, error } = await db
            .from('location_library')
            .insert(locations)
            .select();
        if (error) throw new Error(`Database save failed: ${error.message}`);
        return data || [];
    }

    // ----------------------------------------------------------
    // POINT PROCESSING
    // [PERF v0.3.0] Extracted into its own function so Promise.all
    // can run multiple points concurrently within each batch.
    // Returns a valid location object or null (rejected / errored).
    // Individual try/catch ensures one failure doesn't kill the batch.
    // ----------------------------------------------------------
    async function processPoint(point, hash) {
        try {
            // 1. Street View coverage
            const meta = await checkStreetViewCoverage(point.lat, point.lng);
            if (meta.status !== 'OK') return null;

            // 2. Street name via reverse geocoding
            const streetName = await getStreetName(point.lat, point.lng);
            if (!streetName) return null;

            // 3. Cloud Vision quality check
            const imageUrl     = getStreetViewUrl(point.lat, point.lng);
            const visionResult = await analyzeImageQuality(imageUrl);

            if (!visionResult.accept) {
                console.log(`✗ ${streetName} — score ${visionResult.score} (${visionResult.reason})`);
                return null;
            }

            console.log(`✓ ${streetName} — score ${visionResult.score} (${visionResult.reason})`);
            return {
                coordinate_hash:   hash,
                location_name:     streetName,
                latitude:          point.lat,
                longitude:         point.lng,
                image_url:         imageUrl,
                quality_score:     visionResult.score,
                vision_labels:     visionResult.labels,
                quality_flag:      'good',
                familiarity_score: 5,
                times_used:        0,
                types:             'random_street_view'
            };
        } catch (err) {
            console.warn('Point skipped (error):', err.message);
            return null;
        }
    }

    // ----------------------------------------------------------
    // GET OR GENERATE LOCATIONS
    // ----------------------------------------------------------
    async function getPointsForCoordinate(lat, lng) {
        const hash = getCoordinateHash(lat, lng, CONFIG.radius);

        updateProgress(10, 'Checking for cached locations...');

        // Cache hit
        const cached = await fetchFromSupabase(hash);
        if (cached.length >= CONFIG.minCachedLocations) {
            updateProgress(30, `Found ${cached.length} cached locations!`);
            console.log('Cache HIT:', hash, cached.length, 'rows');
            return cached;
        }

        // Cache miss — generate from scratch
        console.log('Cache MISS:', hash);
        updateProgress(15, 'Generating random points...');

        // Concentric bands prevent clustering on the same streets
        const bands = [
            { minDist:  50, maxDist: 150, count: 20 },
            { minDist: 150, maxDist: 250, count: 20 },
            { minDist: 250, maxDist: 350, count: 30 },
            { minDist: 350, maxDist: 450, count: 30 }
        ];
        const randomPoints = bands.flatMap(b =>
            Array.from({ length: b.count }, () =>
                generateRandomPointNearby(lat, lng, b.minDist, b.maxDist)
            )
        );

        const totalBatches   = Math.ceil(randomPoints.length / CONFIG.batchSize);
        const validLocations = [];
        let processed        = 0;

        updateProgress(20, `Checking ${randomPoints.length} points in ${totalBatches} batches...`);

        for (let i = 0; i < randomPoints.length; i += CONFIG.batchSize) {
            // [PERF v0.3.0] Early exit — stop once enough found
            if (validLocations.length >= CONFIG.targetLocations) {
                console.log(`Reached target of ${CONFIG.targetLocations} — stopping early.`);
                break;
            }

            const batchNum = Math.floor(i / CONFIG.batchSize) + 1;
            const batch    = randomPoints.slice(i, i + CONFIG.batchSize);

            // [PERF v0.3.0] Run this batch in parallel
            const results = await Promise.all(batch.map(p => processPoint(p, hash)));
            validLocations.push(...results.filter(r => r !== null));
            processed += batch.length;

            updateProgress(
                20 + (processed / randomPoints.length) * 38,
                `Batch ${batchNum}/${totalBatches} done — ${validLocations.length} locations found`
            );
        }

        updateProgress(62, `Found ${validLocations.length} quality locations`);

        if (!validLocations.length) {
            throw new Error('No usable Street View images found. Try a different address.');
        }
        if (validLocations.length < 15) {
            console.warn(`Low location count (${validLocations.length}) — may produce fewer than 10 questions.`);
        }

        updateProgress(72, `Saving ${validLocations.length} locations to database...`);
        const saved = await saveToSupabase(validLocations);
        updateProgress(82, 'Saved!');
        return saved;
    }

    // ----------------------------------------------------------
    // QUESTION GENERATION
    // ----------------------------------------------------------
    function generateQuestions(locationRecords, userLat, userLng) {
        updateProgress(86, 'Building questions...');

        const places = locationRecords
            .filter(r => r.latitude && r.longitude)
            .map(r => ({
                id:        r.id,
                name:      r.location_name,
                image_url: r.image_url,
                latitude:  r.latitude,
                longitude: r.longitude,
                distance:  Math.round(haversineDistance(userLat, userLng, r.latitude, r.longitude))
            }))
            .filter(p => p.distance > 0 && p.distance <= CONFIG.radius);

        const questions = [];
        const usedIds   = new Set();

        for (let attempt = 0; attempt < 100 && questions.length < CONFIG.questionsPerGame; attempt++) {
            const available = places.filter(p => !usedIds.has(p.id));
            if (!available.length) break;

            const correct   = available[Math.floor(Math.random() * available.length)];
            const minDist   = correct.distance * 0.5;
            const maxDist   = correct.distance * 1.5;
            const usedNames = new Set([correct.name]);

            const decoys = [];
            const pool   = places
                .filter(p =>
                    p.distance >= minDist && p.distance <= maxDist &&
                    p.id !== correct.id && !usedIds.has(p.id)
                )
                .sort(() => Math.random() - 0.5);

            for (const c of pool) {
                if (!usedNames.has(c.name)) {
                    decoys.push(c);
                    usedNames.add(c.name);
                }
                if (decoys.length === 3) break;
            }

            if (decoys.length < 3) {
                console.log(`Skipped Q${questions.length + 1} — only ${decoys.length} decoys`);
                continue;
            }

            const options = [
                { name: correct.name, distance: correct.distance, isCorrect: true },
                ...decoys.map(d => ({ name: d.name, distance: d.distance, isCorrect: false }))
            ].sort(() => Math.random() - 0.5);

            questions.push({
                question_number: questions.length + 1,
                image_url:       correct.image_url,
                options
            });

            usedIds.add(correct.id);
            decoys.forEach(d => usedIds.add(d.id));
        }

        console.log(`Generated ${questions.length} questions from ${places.length} locations`);
        return questions;
    }

    // [PERF v0.3.0] Kick off background image preloads immediately after
    // question generation. By the time the user reaches Q2, Q3 etc. the
    // browser will have already cached those images — no visible pop/delay.
    function preloadQuestionImages(qs) {
        qs.forEach(q => { const img = new Image(); img.src = q.image_url; });
    }

    // ----------------------------------------------------------
    // GAME ORCHESTRATION
    // ----------------------------------------------------------
    async function startGame() {
        if (!selectedPlace?.geometry) {
            alert('Please select an address first');
            return;
        }

        const lat     = selectedPlace.geometry.location.lat();
        const lng     = selectedPlace.geometry.location.lng();
        const address = selectedPlace.formatted_address;

        showScreen('loadingScreen');
        document.getElementById('selectedAddress').textContent = `Playing from: ${address}`;

        try {
            const records = await getPointsForCoordinate(lat, lng);
            questions     = generateQuestions(records, lat, lng);

            if (!questions.length) {
                throw new Error('Could not generate enough questions. Try a different address.');
            }

            updateProgress(92, 'Preloading images...');
            preloadQuestionImages(questions);

            updateProgress(100, 'Ready!');
            currentQuestion = 0;
            score           = 0;

            await new Promise(r => setTimeout(r, 400));
            showScreen('gameScreen');
            displayQuestion();

        } catch (err) {
            console.error(err);
            showError(err.message);
        }
    }

    // ----------------------------------------------------------
    // DISPLAY & INTERACTION
    // ----------------------------------------------------------
    function displayQuestion() {
        if (currentQuestion >= questions.length) { showResults(); return; }

        answered = false;
        const q  = questions[currentQuestion];

        document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
        document.getElementById('scoreText').textContent    = `Score: ${score}/${currentQuestion}`;
        document.getElementById('questionImage').src        = q.image_url;

        // [CODE v0.3.0] Store correct index as module var, not on window.
        // Radios render enabled — no disabled + setTimeout needed.
        correctAnswerIndex = q.options.findIndex(o => o.isCorrect);

        document.getElementById('optionsContainer').innerHTML = q.options.map((opt, idx) => `
            <label class="option" id="option${idx}" onclick="selectOption(${idx})">
                <input type="radio" name="location" value="${idx}">
                <span class="option-text">${opt.name} (${opt.distance}m away)</span>
                <span class="result-marker" id="marker${idx}"></span>
            </label>
        `).join('');

        const btn       = document.getElementById('nextBtn');
        btn.disabled    = true;
        btn.textContent = currentQuestion === questions.length - 1
            ? 'See Results'
            : 'Next Question \u2192';
    }

    function selectOption(selectedIndex) {
        if (answered) return;
        answered = true;

        if (selectedIndex === correctAnswerIndex) score++;

        questions[currentQuestion].options.forEach((opt, idx) => {
            const optEl    = document.getElementById(`option${idx}`);
            const markerEl = document.getElementById(`marker${idx}`);
            optEl.classList.add('answered');

            if (opt.isCorrect) {
                optEl.classList.add('correct');
                markerEl.textContent = '\u2713'; // ✓
                markerEl.classList.add('correct');
            } else if (idx === selectedIndex) {
                optEl.classList.add('incorrect');
                markerEl.textContent = '\u2717'; // ✗
                markerEl.classList.add('incorrect');
            }
        });

        document.getElementById('scoreText').textContent = `Score: ${score}/${currentQuestion + 1}`;

        // Brief pause before enabling Next so user can register the result
        setTimeout(() => {
            document.getElementById('nextBtn').disabled = false;
        }, 800);
    }

    function nextQuestion() {
        currentQuestion++;
        displayQuestion();
    }

    function showResults() {
        const pct = Math.round((score / questions.length) * 100);
        document.getElementById('finalScore').textContent     = `${score}/${questions.length}`;
        document.getElementById('resultsMessage').textContent =
            pct >= 90 ? '\uD83C\uDFC6 Amazing! You really know your local area!'   :
            pct >= 70 ? '\uD83D\uDC4F Great job! You know your neighbourhood well!' :
            pct >= 50 ? '\uD83D\uDC4D Not bad! Time to explore more!'               :
                        '\uD83D\uDDFA\uFE0F Maybe take a walk around your area!';
        showScreen('resultsScreen');
    }
</script>
</body>
